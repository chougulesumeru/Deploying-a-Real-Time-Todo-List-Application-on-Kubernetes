apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  namespace: to-do-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: to-do-app
  template:
    metadata:
      labels:
        app: to-do-app

    spec:
      containers:
        - name: mongo-container
          image: mongo:latest
          ports:
            - containerPort: 27017

          volumeMounts:
            - name: mongo-volume
              mountPath: /data/db

      volumes:
        - name: mongo-volume
          persistentVolumeClaim:
            claimName: mongo-pvc