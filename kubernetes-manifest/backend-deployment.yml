apiVersion: apps/v1
kind: Deployment
metadata:
  name: to-do-app-backend-deployment
  namespace: to-do-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: to-do-backend

  template:
    metadata:
      labels:
        app: to-do-backend

    spec:
      containers:
        - name: backend
          image: to-do-backend:latest
          ports:
            - containerPort: 3001

          env:
            - name: MONGO_URL
              value: "mongodb://mongo-service:27017/to-dos"