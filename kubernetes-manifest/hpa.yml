# HPA for backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: todo-hpa
  namespace: to-do-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: to-do-app-backend-deployment

  minReplicas: 2
  maxReplicas: 4

  metrices:
    - type: Resource
      resource:
        name: cpu
        target:
          - type: Utilization
            averageUtilization: 50
